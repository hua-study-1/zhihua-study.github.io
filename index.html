<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++在线判题系统</title>
    <style>
        /* 样式与之前相同，精简显示 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f0f23); min-height: 100vh; padding: 20px; }
        .container { width: 95%; max-width: 1400px; margin: 0 auto; }
        .hide { display: none !important; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 13px; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a67d8; transform: translateY(-2px); }
        .btn-success { background: #48bb78; color: #fff; }
        .btn-success:hover { background: #38a169; transform: translateY(-2px); }
        .btn-danger { background: #f56565; color: #fff; }
        .btn-danger:hover { background: #e53e3e; transform: translateY(-2px); }
        .btn-warning { background: #ed8936; color: #fff; }
        .btn-info { background: #4299e1; color: #fff; }
        .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid #667eea; color: #667eea; }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin: 20px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background: #667eea; color: #fff; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .flex-row { display: flex; gap: 25px; flex-wrap: wrap; }
        .left-box, .right-box { flex: 1; min-width: 300px; }
        .problem-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .problem-item:hover { background: rgba(102,126,234,0.1); }
        .problem-title { font-size: 18px; font-weight: 600; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .result-card { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; }
        .error-message { background: #fed7d7; color: #c53030; padding: 15px; border-radius: 12px; margin: 15px 0; font-family: monospace; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #48bb78; color: #fff; padding: 12px 24px; border-radius: 10px; z-index: 10000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .refresh-btn { animation: rotate 0.5s ease; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .badge-easy { background: #48bb78; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .badge-medium { background: #ed8936; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .badge-hard { background: #f56565; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .class-detail-card { background: #f7fafc; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .stat-number { font-size: 28px; font-weight: 700; color: #667eea; }
        .notice-item, .homework-item { background: #fff; padding: 12px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .notice-item { border-left: 4px solid #667eea; }
        .homework-item { border-left: 4px solid #48bb78; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 云同步面板 */
        .sync-panel {
            background: linear-gradient(135deg, #24292e, #1a1a2e);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .sync-panel input { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 200px; margin: 0; }
        .sync-panel input::placeholder { color: rgba(255,255,255,0.6); }
        .sync-status { font-size: 13px; color: #aaa; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background: #48bb78; }
        .status-dot.offline { background: #f56565; }
    </style>
</head>

<script>
// ==================== 云同步 (JSONBin.io) ====================
let CLOUD = {
    binId: localStorage.getItem('cloud_bin_id') || '',
    apiKey: localStorage.getItem('cloud_api_key') || ''
};

function updateCloudStatus() {
    let dot = document.getElementById('syncDot');
    let status = document.getElementById('syncStatus');
    if (CLOUD.binId && CLOUD.apiKey) {
        dot.className = 'status-dot online';
        status.innerText = '已连接: ' + CLOUD.binId.substring(0, 8) + '...';
    } else {
        dot.className = 'status-dot offline';
        status.innerText = '未连接';
    }
}

async function createCloudBin() {
    let apiKey = prompt('请输入你的 JSONBin.io API Key:\n\n1. 注册 https://jsonbin.io\n2. 在 Dashboard 获取 API Key');
    if (!apiKey) return;
    try {
        let data = {
            problemList: globalData.problemList,
            studentList: globalData.studentList,
            submitRecords: globalData.submitRecords,
            classList: globalData.classList,
            version: '1.0',
            created: new Date().toISOString()
        };
        let res = await fetch('https://api.jsonbin.io/v3/b', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('创建失败');
        let result = await res.json();
        CLOUD.binId = result.metadata.id;
        CLOUD.apiKey = apiKey;
        localStorage.setItem('cloud_bin_id', CLOUD.binId);
        localStorage.setItem('cloud_api_key', CLOUD.apiKey);
        document.getElementById('jsonBinId').value = CLOUD.binId;
        document.getElementById('jsonApiKey').value = CLOUD.apiKey;
        updateCloudStatus();
        showToast('✅ 云端创建成功！Bin ID: ' + CLOUD.binId);
    } catch(e) {
        showToast('❌ ' + e.message);
    }
}

function connectCloud() {
    let binId = document.getElementById('jsonBinId').value.trim();
    let apiKey = document.getElementById('jsonApiKey').value.trim();
    if (!binId || !apiKey) { showToast('❌ 请填写 Bin ID 和 API Key'); return; }
    CLOUD.binId = binId;
    CLOUD.apiKey = apiKey;
    localStorage.setItem('cloud_bin_id', binId);
    localStorage.setItem('cloud_api_key', apiKey);
    updateCloudStatus();
    showToast('✅ 已连接云端');
}

async function uploadToCloud() {
    if (!CLOUD.binId || !CLOUD.apiKey) { showToast('❌ 请先连接云端'); return; }
    showToast('⏳ 上传中...');
    try {
        let data = {
            problemList: globalData.problemList,
            studentList: globalData.studentList,
            submitRecords: globalData.submitRecords,
            classList: globalData.classList,
            version: '1.0',
            lastSync: new Date().toISOString()
        };
        let res = await fetch('https://api.jsonbin.io/v3/b/' + CLOUD.binId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD.apiKey },
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('上传失败');
        showToast('✅ 数据已上传到云端');
    } catch(e) {
        showToast('❌ ' + e.message);
    }
}

async function downloadFromCloud() {
    if (!CLOUD.binId || !CLOUD.apiKey) { showToast('❌ 请先连接云端'); return; }
    showToast('⏳ 下载中...');
    try {
        let res = await fetch('https://api.jsonbin.io/v3/b/' + CLOUD.binId + '/latest', {
            headers: { 'X-Master-Key': CLOUD.apiKey }
        });
        if (!res.ok) throw new Error('下载失败');
        let result = await res.json();
        let data = result.record;
        if (data.problemList) globalData.problemList = data.problemList;
        if (data.studentList) globalData.studentList = data.studentList;
        if (data.submitRecords) globalData.submitRecords = data.submitRecords;
        if (data.classList) globalData.classList = data.classList;
        saveData();
        // 刷新界面
        if (globalData.role === 'teacher') {
            renderTeacherProblemList(); renderSubmitRecords(); renderClassList(); renderAdminStudentTable(); renderAdminProblemTable();
        } else {
            renderStudentProblemList();
        }
        showToast('✅ 数据已从云端下载');
    } catch(e) {
        showToast('❌ ' + e.message);
    }
}

// ==================== 数据存储 ====================
let globalData = {
    role: null, userInfo: null, problemList: [], studentList: [], submitRecords: [],
    classList: [], currentProblem: null, currentClass: null,
    currentEditHomework: { classId: null, homeworkIndex: null }
};

function generateClassCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }

function initData() {
    let saved = localStorage.getItem('oj_system_data');
    if (saved) {
        try {
            let data = JSON.parse(saved);
            globalData.problemList = data.problemList || [];
            globalData.studentList = data.studentList || [];
            globalData.submitRecords = data.submitRecords || [];
            globalData.classList = data.classList || [];
        } catch(e) {}
    }
    if (globalData.problemList.length === 0) {
        globalData.problemList = [
            { id: 1, title: "Hello World", desc: "输出 Hello World", difficulty: "easy", testPoint: [{ input: "", output: "Hello World", score: 100 }] },
            { id: 2, title: "两数之和", desc: "输入a和b，输出a+b", difficulty: "easy", testPoint: [{ input: "1 2", output: "3", score: 100 }] }
        ];
    }
    if (globalData.classList.length === 0) {
        let futureDate = new Date(); futureDate.setDate(futureDate.getDate() + 7);
        globalData.classList = [{
            id: 1, name: "基础1班", code: generateClassCode(), desc: "C++编程基础班",
            notices: [{ id: Date.now(), title: "欢迎加入", content: "欢迎来到C++编程课堂！", time: Date.now() }],
            homeworks: [{ id: Date.now(), title: "第一次作业", desc: "完成Hello World题目", problemId: 1, problemTitle: "Hello World", deadline: futureDate.getTime(), time: Date.now() }],
            createdAt: Date.now()
        }];
    }
    if (globalData.studentList.length === 0) {
        globalData.studentList = [{ name: "张三", acc: "zhangsan", pwd: "123456", classId: 1 }];
    }
    saveData();
}

function saveData() {
    localStorage.setItem('oj_system_data', JSON.stringify({
        problemList: globalData.problemList,
        studentList: globalData.studentList,
        submitRecords: globalData.submitRecords,
        classList: globalData.classList
    }));
}

function getClassName(id) {
    if (!id) return '未分配';
    let c = globalData.classList.find(c => c.id === id);
    return c ? c.name : '未分配';
}

function showToast(msg) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function getStudentBestScore(userName, probName) {
    let userSubmits = globalData.submitRecords.filter(r => r.userName === userName && r.probName === probName);
    if (userSubmits.length === 0) return 0;
    return Math.max(...userSubmits.map(r => r.score));
}

function getStudentTotalScore(userName) {
    let userProblems = new Set();
    for (let r of globalData.submitRecords.filter(r => r.userName === userName)) {
        userProblems.add(r.probName);
    }
    let total = 0;
    for (let probName of userProblems) {
        total += getStudentBestScore(userName, probName);
    }
    return total;
}

// ==================== 编译器 ====================
const JUDGE0_API = "https://ce.judge0.com";
const LANGUAGE_ID = 54;

async function compileAndRunCpp(code, stdin) {
    try {
        let res = await fetch(JUDGE0_API + '/submissions?base64_encoded=false&wait=false', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source_code: code, language_id: LANGUAGE_ID, stdin: stdin })
        });
        if (!res.ok) throw new Error('提交失败');
        let data = await res.json();
        let token = data.token;
        let result = null;
        for (let i = 0; i < 15; i++) {
            await new Promise(r => setTimeout(r, 1000));
            let r2 = await fetch(JUDGE0_API + '/submissions/' + token + '?base64_encoded=false');
            if (!r2.ok) continue;
            result = await r2.json();
            if (result.status && result.status.id >= 3) break;
        }
        if (!result) return { success: false, error: "判题超时" };
        if (result.status && result.status.id === 3) {
            return { success: true, output: (result.stdout || "").trim(), error: null };
        } else if (result.status && result.status.id === 6) {
            return { success: false, error: "编译错误:\n" + (result.compile_output || "未知编译错误") };
        } else {
            return { success: false, error: "运行错误:\n" + (result.stderr || result.message || "未知错误") };
        }
    } catch(e) {
        return { success: true, output: "", error: null };
    }
}

async function submitCodeJudge() {
    const code = document.getElementById('codeEditor').value;
    const prob = globalData.currentProblem;
    if (!prob) return;
    const resultDiv = document.getElementById('judgeResultBox');
    resultDiv.innerHTML = '<div style="text-align:center;padding:20px;"><div class="loading"></div> ⏳ 判题中...</div>';
    let totalScore = 0, maxScore = 0, compileError = null;
    for (let tp of prob.testPoint) {
        maxScore += tp.score;
        const result = await compileAndRunCpp(code, tp.input);
        if (result.error) { compileError = result.error; break; }
        if (result.output === tp.output) totalScore += tp.score;
    }
    const userName = globalData.userInfo?.name;
    let bestScore = getStudentBestScore(userName, prob.title);
    if (compileError) {
        resultDiv.innerHTML = `<div class="error-message">❌ ${compileError.replace(/\n/g, '<br>')}</div>`;
        saveRecord(prob.title, totalScore, maxScore, code, compileError);
    } else {
        let isNewBest = totalScore > bestScore;
        if (totalScore === maxScore) {
            createConfetti();
            resultDiv.innerHTML = `<div class="result-card"><h2>🎉 恭喜！答案正确！ 🎉</h2><p style="font-size:48px;">${totalScore}/${maxScore}</p>${isNewBest ? '<p>✨ 刷新了你的最好成绩！</p>' : '<p>本题已满分，继续保持！</p>'}</div>`;
            showToast('🎉 满分！');
        } else {
            resultDiv.innerHTML = `<div class="result-card" style="background:linear-gradient(135deg,#f56565,#e53e3e);"><h3>❌ 答案错误</h3><p>得分: ${totalScore}/${maxScore}</p>${isNewBest ? '<p>虽然未满分，但比之前有进步！</p>' : ''}</div>`;
        }
        saveRecord(prob.title, totalScore, maxScore, code, null);
    }
}

function createConfetti() {
    for (let i = 0; i < 100; i++) {
        let c = document.createElement('div');
        c.style.cssText = 'position:fixed;width:'+(Math.random()*10+5)+'px;height:'+(Math.random()*10+5)+'px;background:hsl('+(Math.random()*360)+',80%,60%);left:'+(Math.random()*100)+'%;top:-10px;border-radius:50%;pointer-events:none;z-index:9999;animation:confettiFall 3s ease-in-out forwards;';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

    let pwd = document.getElementById('loginPwd').value.trim();
    if (acc === 'admin' && pwd === '123456') {
        globalData.role = 'teacher';
        globalData.userInfo = { name: '教师' };
        hideAllPages();
        document.getElementById('teacherMainPage').classList.remove('hide');
        renderTeacherProblemList();
        renderSubmitRecords();
        showToast('👨‍🏫 欢迎教师');
    } else {
        let stu = globalData.studentList.find(s => s.acc === acc && s.pwd === pwd);
        if (stu) {
            globalData.role = 'student';
            globalData.userInfo = { ...stu };
            hideAllPages();
            document.getElementById('studentMainPage').classList.remove('hide');
            renderStudentProblemList();
            showToast('👋 欢迎 ' + stu.name);
        } else {
            document.getElementById('loginTip').innerText = '账号或密码错误';
        }
    }
}

function userLogout() {
    globalData.role = null;
    globalData.userInfo = null;
    hideAllPages();
    document.getElementById('loginPage').classList.remove('hide');
    document.getElementById('loginAcc').value = '';
    document.getElementById('loginPwd').value = '';
    showToast('已退出');
}

function enterCodePage(pid) {
    let p = globalData.problemList.find(p => p.id === pid);
    if (!p) return;
    globalData.currentProblem = p;
    hideAllPages();
    document.getElementById('codeEditPage').classList.remove('hide');
    document.getElementById('nowProblemTitle').innerText = p.title;
    document.getElementById('nowProblemDesc').innerText = p.desc;
    document.getElementById('codeEditor').value = '#include <iostream>\nusing namespace std;\n\nint main() {\n    \n    return 0;\n}';
    document.getElementById('judgeResultBox').innerHTML = '';
}

function backProblemList() {
    hideAllPages();
    if (globalData.role === 'teacher') { document.getElementById('teacherMainPage').classList.remove('hide');
        renderTeacherProblemList(); } else { document.getElementById('studentMainPage').classList.remove('hide');
        renderStudentProblemList(); }
}

function backToStudentMain() { hideAllPages();
    document.getElementById('studentMainPage').classList.remove('hide');
    renderStudentProblemList(); }

function openAdminPage() { hideAllPages();
    document.getElementById('teacherAdminPage').classList.remove('hide');
    switchAdminTab('class');
    renderClassList(); }

function backToTeacherMain() { hideAllPages();
    document.getElementById('teacherMainPage').classList.remove('hide');
    renderTeacherProblemList();
    renderSubmitRecords(); }

function switchTeacherTab(tab) {
    let p = document.getElementById('teacherProblemsPanel');
    let r = document.getElementById('teacherRecordsPanel');
    p.classList.add('hide');
    r.classList.add('hide');
    if (tab === 'problems') p.classList.remove('hide');
    else { r.classList.remove('hide');
        renderSubmitRecords(); }
}

function switchAdminTab(tab) {
    let s = document.getElementById('adminStudentPanel');
    let pr = document.getElementById('adminProblemPanel');
    let c = document.getElementById('adminClassPanel');
    s.classList.add('hide');
    pr.classList.add('hide');
    c.classList.add('hide');
    if (tab === 'student') { s.classList.remove('hide');
        renderAdminStudentTable();
        updateClassSelects(); } else if (tab === 'problem') { pr.classList.remove('hide');
        renderAdminProblemTable(); } else { c.classList.remove('hide');
        renderClassList(); }
}

function viewSubmitDetail(id) {
    let r = globalData.submitRecords.find(x => x.id === id);
    if (!r) return;
    hideAllPages();
    document.getElementById('viewSubmitDetailPage').classList.remove('hide');
    document.getElementById('submitDetailInfo').innerHTML = '<p><strong>学生:</strong> ' + escapeHtml(r.userName) + '</p><p><strong>题目:</strong> ' + escapeHtml(r.probName) + '</p><p><strong>得分:</strong> ' + r.score + '/' + r.full + '</p><p><strong>时间:</strong> ' + new Date(r.time).toLocaleString() + '</p>';
    document.getElementById('detailCodeContent').value = r.code;
    document.getElementById('detailJudgeContent').innerHTML = r.error ? '<div class="error-message">' + escapeHtml(r.error) + '</div>' : '<p>得分: ' + r.score + '/' + r.full + '</p>';
}

function backToRecords() { hideAllPages();
    document.getElementById('teacherMainPage').classList.remove('hide');
    switchTeacherTab('records'); }

// ==================== 增删改 ====================
let currentEditIdx = -1;

function openAddStudentModal() { document.getElementById('addStudentModal').classList.remove('hide');
    updateClassSelects(); }
function closeAddStudentModal() { document.getElementById('addStudentModal').classList.add('hide'); }

function saveNewStudent() {
    let name = document.getElementById('addStuName').value.trim();
    let acc = document.getElementById('addStuAcc').value.trim();
    let pwd = document.getElementById('addStuPwd').value.trim();
    let classId = parseInt(document.getElementById('addStuClassId').value) || null;
    if (!name || !acc) { alert('请填写完整'); return; }
    if (globalData.studentList.some(s => s.acc === acc)) { alert('账号已存在'); return; }
    globalData.studentList.push({ name, acc, pwd, classId });
    saveData();
    closeAddStudentModal();
    renderAdminStudentTable();
    showToast('✅ 学生添加成功');
}

function openEditStudentModal(i) {
    currentEditIdx = i;
    let s = globalData.studentList[i];
    document.getElementById('editStuName').value = s.name;
    document.getElementById('editStuAcc').value = s.acc;
    document.getElementById('editStuPwd').value = s.pwd;
    updateClassSelects();
    if (s.classId) document.getElementById('editStuClassId').value = s.classId;
    document.getElementById('editStudentModal').classList.remove('hide');
}
function closeEditStudentModal() { document.getElementById('editStudentModal').classList.add('hide'); }

function updateStudent() {
    let name = document.getElementById('editStuName').value.trim();
    let acc = document.getElementById('editStuAcc').value.trim();
    let pwd = document.getElementById('editStuPwd').value.trim();
    let classId = parseInt(document.getElementById('editStuClassId').value) || null;
    if (!name || !acc) { alert('请填写完整'); return; }
    globalData.studentList[currentEditIdx] = { name, acc, pwd, classId };
    saveData();
    closeEditStudentModal();
    renderAdminStudentTable();
    showToast('✅ 学生信息已更新');
}

function deleteStudent(i) {
    if (confirm('确定删除？')) {
        globalData.studentList.splice(i, 1);
        saveData();
        renderAdminStudentTable();
        showToast('✅ 已删除');
    }
}

function updateClassSelects() {
    let opts = '<option value="">-- 请选择班级 --</option>';
    for (let c of globalData.classList) opts += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
    let s1 = document.getElementById('addStuClassId');
    let s2 = document.getElementById('editStuClassId');
    if (s1) s1.innerHTML = opts;
    if (s2) s2.innerHTML = opts;
}

function openAddClassModal() { document.getElementById('addClassModal').classList.remove('hide');
    document.getElementById('addClassName').value = '';
    document.getElementById('addClassDesc').value = ''; }
function closeAddClassModal() { document.getElementById('addClassModal').classList.add('hide'); }

function saveNewClass() {
    let name = document.getElementById('addClassName').value.trim();
    let desc = document.getElementById('addClassDesc').value.trim();
    if (!name) { alert('请输入班级名称'); return; }
    globalData.classList.push({ id: Date.now(), name: name, desc: desc, code: generateClassCode(), notices: [], homeworks: [], createdAt: Date.now() });
    saveData();
    closeAddClassModal();
    renderClassList();
    updateClassSelects();
    showToast('✅ 班级创建成功');
}

function deleteProblemById(id) {
    if (confirm('确定删除题目？')) {
        let idx = globalData.problemList.findIndex(p => p.id === id);
        if (idx !== -1) {
            globalData.problemList.splice(idx, 1);
            saveData();
            renderAdminProblemTable();
            if (globalData.role === 'teacher') renderTeacherProblemList();
            showToast('✅ 题目已删除');
        }
    }
}

function openAddProblemModal() { document.getElementById('addProblemModal').classList.remove('hide');
    document.getElementById('testPointWrap').innerHTML = '';
    addTestPoint(); }
function closeAddProblemModal() { document.getElementById('addProblemModal').classList.add('hide'); }

function addTestPoint() {
    let wrap = document.getElementById('testPointWrap');
    let cnt = wrap.querySelectorAll('.test-point-card').length + 1;
    let div = document.createElement('div');
    div.className = 'test-point-card';
    div.innerHTML = '<div style="margin:10px 0;padding:10px;background:#f0f0f0;border-radius:10px;"><strong>测试点 ' + cnt + '</strong><br><input type="text" class="tpInput" placeholder="输入数据"><input type="text" class="tpOutput" placeholder="预期输出"><input type="number" class="tpScore" placeholder="分值" value="10" style="width:80px;"><button class="btn btn-danger" onclick="this.parentElement.remove()">删除</button></div>';
    wrap.appendChild(div);
}

function saveNewProblem() {
    let title = document.getElementById('addProbTitle').value.trim();
    let desc = document.getElementById('addProbDesc').value.trim();
    let diff = document.getElementById('addProbDifficulty').value;
    if (!title) { alert('请输入题目名称'); return; }
    let tps = [];
    document.querySelectorAll('#testPointWrap .test-point-card').forEach(card => {
        let input = card.querySelector('.tpInput')?.value || "";
        let output = card.querySelector('.tpOutput')?.value.trim();
        let score = parseInt(card.querySelector('.tpScore')?.value) || 0;
        if (output) tps.push({ input, output, score });
    });
    if (tps.length === 0) { alert('请添加测试点'); return; }
    globalData.problemList.push({ id: Date.now(), title: title, desc: desc || '无描述', difficulty: diff, testPoint: tps });
    saveData();
    closeAddProblemModal();
    renderAdminProblemTable();
    if (globalData.role === 'teacher') renderTeacherProblemList();
    showToast('✅ 题目添加成功');
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

// ==================== 启动 ====================
const styleSheet = document.createElement('style');
styleSheet.textContent = '@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }';
document.head.appendChild(styleSheet);

// 恢复云端配置
if (localStorage.getItem('cloud_bin_id')) {
    CLOUD.binId = localStorage.getItem('cloud_bin_id');
    CLOUD.apiKey = localStorage.getItem('cloud_api_key');
    document.getElementById('jsonBinId').value = CLOUD.binId;
    document.getElementById('jsonApiKey').value = CLOUD.apiKey;
}
updateCloudStatus();

initData();
hideAllPages();
document.getElementById('loginPage').classList.remove('hide');
</script>
